<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30363d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .name { font: 600 44px system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif; fill: #e6edf3; }
    .subtitle { font: 400 17px system-ui, -apple-system, 'Segoe UI', Helvetica, sans-serif; fill: #8b949e; letter-spacing: 0.5px; }
    .name, .subtitle { opacity: 0; animation: fadeUp 0.8s ease forwards; }
    .subtitle { animation-delay: 0.15s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <rect width="1200" height="200" fill="url(#bg)"/>
  <rect x="0" y="188" width="1200" height="12" fill="url(#accent)" opacity="0.5"/>
  <text x="600" y="88" text-anchor="middle" class="name">Mattias Ubbesen</text>
  <text x="600" y="122" text-anchor="middle" class="subtitle">Junior Fullstack Developer  ·  Stockholm</text>
  <line x1="200" y1="150" x2="1000" y2="150" stroke="url(#line)" stroke-width="0.5"/>
</svg>
